version = 1

; Jetson Orin Nano 8GB — model presets from the benchmark campaign
; (github.com/jimenezcarrero/jetson-llm-benchmarks)
; Used by llama-server router mode: requesting a model name below
; loads it with these exact flags (previous model is unloaded first,
; --models-max 1 on an 8GB board).

[*]
ngl     = 99
fa      = on
np      = 1
jinja   = true
metrics = true

; ── CHAMPION — undefeated in all 4 arenas, both window sizes.
;    Peak usage ever observed: 50K ctx, so 65K is comfortable.
[ornith]
model    = /home/JetsonOrin/Repositories/llama.cpp/models/Ornith-1.0-9B-MTP-IQ3_M.gguf
c        = 65536
ctk      = q4_0
ctv      = q4_0
ub       = 128

; ── SPEED PICK — fastest perfect marathon (15m47s), agent-tuned.
[a1-131k]
model    = /home/JetsonOrin/Repositories/llama.cpp/models/Agents-A1-4B-Q4_K_M.gguf
c        = 131072
ctk      = q4_0
ctv      = q4_0

; ── MAX CONTEXT — only model whose full 262K native window fits this board.
[a1-262k]
model    = /home/JetsonOrin/Repositories/llama.cpp/models/Agents-A1-4B-Q4_K_M.gguf
c        = 262144
ctk      = q4_0
ctv      = q4_0

; ── QUALITY GEMMA — 10/11 marathon; MUST run in a 32K pi window
;    (bloats past 82K if given more). MTP draft = +55% generation.
[e4b-32k]
model       = /home/JetsonOrin/Repositories/llama.cpp/models/gemma-4-E4B-it-qat-UD-Q4_K_XL.gguf
model-draft = /home/JetsonOrin/Repositories/llama.cpp/models/mtp-gemma-4-E4B-it.gguf
spec-type   = draft-mtp
ngld        = 99
c           = 32768
ctk         = q8_0
ctv         = q8_0

; ── INTERACTIVE SPEED — ~50 tok/s one-shot champion; weak in long
;    sessions (3/11 marathon). Chat/quick-question use, 32K window.
[e2b-32k]
model       = /home/JetsonOrin/Repositories/llama.cpp/models/gemma-4-E2B-it-qat-UD-Q4_K_XL.gguf
model-draft = /home/JetsonOrin/Repositories/llama.cpp/models/mtp-gemma-4-E2B-it.gguf
spec-type   = draft-mtp
ngld        = 99
c           = 32768
ctk         = q8_0
ctv         = q8_0

; ── BASELINE — base Qwen3.5-4B (not agent-tuned): fine for chat,
